<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JeanScore – Avaliações do Cruzeiro</title>
  <!--
    SPA routing decoder for GitHub Pages (Requirements 12.3, 12.4).

    When a deep link is opened directly, `public/404.html` redirects here with
    the original path encoded in the query string (`/?/jogador/123`). This
    script restores the real URL via `history.replaceState` before React Router
    reads `window.location`, so the correct route loads and the browser back
    button navigates to the previous route (including the 404 page). It runs
    only when the redirect marker (`?/`) is present, so normal navigation is
    untouched. Must run before the app bundle.
  -->
  <script>
    (function (l) {
      if (l.search[1] === '/') {
        var decoded = l.search
          .slice(1)
          .split('&')
          .map(function (s) {
            return s.replace(/~and~/g, '&');
          })
          .join('?');
        window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
      }
    })(window.location);
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
